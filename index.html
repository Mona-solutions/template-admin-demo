<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome | Simple Landing Page</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(120deg, #f8fafc 0%, #e0e7ef 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .container {
        background: #fff;
        padding: 2.5rem 2rem;
        border-radius: 1.2rem;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        text-align: center;
        max-width: 400px;
      }
      h1 {
        margin-bottom: 0.5rem;
        color: #2d3748;
        font-size: 2.2rem;
      }
      p {
        color: #4a5568;
        margin-bottom: 1.5rem;
      }
      .cta {
        display: inline-block;
        padding: 0.7rem 1.5rem;
        background: #2563eb;
        color: #fff;
        border-radius: 0.5rem;
        text-decoration: none;
        font-weight: 600;
        transition: background 0.2s;
      }
      .cta:hover {
        background: #1e40af;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Welcome!</h1>
      <p>This is a simple landing page built with just HTML.</p>
      <a href="#" class="cta">Get Started</a>
    </div>
  </body>
</html>
